# ── Spring Shell ──────────────────────────────────────────────────────────────
spring.shell.interactive.enabled=true
spring.shell.command.script.enabled=false

# ── Spring Boot ───────────────────────────────────────────────────────────────
spring.main.banner-mode=off

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.hidarinovel=INFO
logging.level.org.springframework.shell=WARN

# ── NovelMania scraper ────────────────────────────────────────────────────────
# Delay in ms before each chapter fetch to prevent hammering the server
novelmania.throttle-ms=800

# Base directory where all novels will be saved
novelmania.output-dir=${user.home}/Documents/shared/others/Novels